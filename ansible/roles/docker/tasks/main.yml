---
- name: Stop Docker service if running
  systemd:
    name: docker
    state: stopped
  ignore_errors: yes

- name: Remove all Docker packages completely
  shell: |
    apt-get purge -y docker* containerd* runc || true
    apt-get autoremove -y || true
  ignore_errors: yes

- name: Remove all Docker files and directories
  shell: |
    rm -rf /var/lib/docker
    rm -rf /var/lib/containerd
    rm -f /etc/apt/sources.list.d/docker*
    rm -f /usr/share/keyrings/docker*
    rm -f /etc/apt/keyrings/docker*
  ignore_errors: yes

- name: Clean apt cache
  shell: |
    apt-get clean
    apt-get update
  ignore_errors: yes

- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download and add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list

- name: Update apt after adding repository
  apt:
    update_cache: yes

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Add user to docker group
  user:
    name: esteban
    groups: docker
    append: yes

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Test Docker installation
  command: docker --version
  register: docker_version

- name: Display Docker version
  debug:
    msg: "{{ docker_version.stdout }}"